<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>证券客服 QA 质量护栏演示</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-800">
    <div class="max-w-6xl mx-auto px-4 py-10">
      <header class="mb-8">
        <h1 class="text-3xl font-bold tracking-tight">问答质量评价系统</h1>
        <p class="mt-2 text-slate-600">
          上方填写问答内容，系统将调用质量评估模型进行 3 分类打分，并在下方输出结果。
        </p>
      </header>

      <main class="space-y-6">
        <section class="grid grid-cols-1 lg:grid-cols-2 gap-6 items-start">
          <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
            <h2 class="text-xl font-semibold mb-4">用户提问</h2>
            <textarea
              id="question"
              rows="10"
              class="w-full rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 p-3"
              placeholder="例如：现在市场震荡，我该如何配置偏稳健的证券资产？"
            ></textarea>
          </div>

          <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
            <h2 class="text-xl font-semibold mb-4">董秘回答</h2>
            <textarea
              id="answer"
              rows="10"
              class="w-full rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 p-3"
              placeholder="例如：建议先明确风险偏好，再考虑债券基金、货币类资产与分散化配置..."
            ></textarea>
          </div>
        </section>

        <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
          <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
            <p class="text-sm text-slate-600">确认上方问答后，点击按钮进行质量检测。</p>
            <button
              id="evaluateBtn"
              class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-6 rounded-xl transition"
            >
              进行质量检测
            </button>
          </div>
          <p id="errorMsg" class="hidden mt-4 text-sm text-red-600"></p>
        </section>

        <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
          <h2 class="text-xl font-semibold mb-4">结果区</h2>

          <div
            id="resultPlaceholder"
            class="min-h-[140px] flex items-center justify-center rounded-xl border-2 border-dashed border-slate-300 text-slate-500"
          >
            尚未检测，请先在上方填写问答并提交。
          </div>

          <div id="resultCard" class="hidden rounded-xl p-6">
            <div class="flex items-center justify-between gap-3">
              <p class="text-sm font-medium uppercase tracking-wider">模型判定</p>
              <span id="labelBadge" class="text-xs px-3 py-1 rounded-full font-semibold"></span>
            </div>

            <p id="labelName" class="mt-3 text-3xl font-bold"></p>
            <p class="mt-2 text-sm">确信度</p>
            <p id="confidenceText" class="text-2xl font-semibold"></p>
          </div>
        </section>
      </main>
    </div>

    <script>
      const API_BASE = "http://127.0.0.1:8000";

      const questionEl = document.getElementById("question");
      const answerEl = document.getElementById("answer");
      const btnEl = document.getElementById("evaluateBtn");
      const errorMsgEl = document.getElementById("errorMsg");
      const resultPlaceholderEl = document.getElementById("resultPlaceholder");
      const resultCardEl = document.getElementById("resultCard");
      const labelBadgeEl = document.getElementById("labelBadge");
      const labelNameEl = document.getElementById("labelName");
      const confidenceTextEl = document.getElementById("confidenceText");

      function getThemeByLabel(labelId) {
        if (labelId === 0) {
          return {
            card: "bg-red-50 border border-red-200 text-red-800",
            badge: "bg-red-600 text-white",
            badgeText: "拦截",
          };
        }
        if (labelId === 1) {
          return {
            card: "bg-amber-50 border border-amber-200 text-amber-800",
            badge: "bg-amber-500 text-white",
            badgeText: "复核",
          };
        }
        return {
          card: "bg-emerald-50 border border-emerald-200 text-emerald-800",
          badge: "bg-emerald-600 text-white",
          badgeText: "通行",
        };
      }

      btnEl.addEventListener("click", async () => {
        const question = questionEl.value.trim();
        const answer = answerEl.value.trim();

        errorMsgEl.classList.add("hidden");

        if (!question || !answer) {
          errorMsgEl.textContent = "请同时填写“用户提问”和“董秘回答”。";
          errorMsgEl.classList.remove("hidden");
          return;
        }

        btnEl.disabled = true;
        btnEl.textContent = "检测中...";

        try {
          const resp = await fetch(`${API_BASE}/api/evaluate`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question, answer }),
          });

          if (!resp.ok) {
            const err = await resp.json().catch(() => ({}));
            throw new Error(err.detail || "服务调用失败，请稍后重试。");
          }

          const data = await resp.json();
          const theme = getThemeByLabel(data.label_id);

          resultPlaceholderEl.classList.add("hidden");
          resultCardEl.classList.remove("hidden");

          resultCardEl.className = `rounded-xl p-6 ${theme.card}`;
          labelBadgeEl.className = `text-xs px-3 py-1 rounded-full font-semibold ${theme.badge}`;
          labelBadgeEl.textContent = theme.badgeText;
          labelNameEl.textContent = data.label_name;
          confidenceTextEl.textContent = `${Number(data.confidence).toFixed(2)}%`;
        } catch (error) {
          errorMsgEl.textContent = error.message || "请求失败，请检查后端是否启动。";
          errorMsgEl.classList.remove("hidden");
        } finally {
          btnEl.disabled = false;
          btnEl.textContent = "进行质量检测";
        }
      });
    </script>
  </body>
</html>
