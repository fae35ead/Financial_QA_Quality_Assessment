services:
  postgres:
    image: postgres:15
    container_name: qa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: qa_review
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d qa_review"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - qa_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: qa_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s

  api:
    image: qa-backend:latest
    container_name: qa_api
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    environment:
      QA_DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/qa_review
      QA_DATABASE_FALLBACK_TO_SQLITE: "false"
      QA_CELERY_BROKER_URL: redis://redis:6379/0
      QA_CELERY_RESULT_BACKEND: redis://redis:6379/1
      QA_CELERY_TASK_ALWAYS_EAGER: "false"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: qa-backend:latest
    container_name: qa_worker
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    command: ["celery", "-A", "app.core.celery_app.celery_app", "worker", "--loglevel=info", "--pool=prefork", "--concurrency=2"]
    env_file:
      - .env
    environment:
      QA_DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/qa_review
      QA_DATABASE_FALLBACK_TO_SQLITE: "false"
      QA_CELERY_BROKER_URL: redis://redis:6379/0
      QA_CELERY_RESULT_BACKEND: redis://redis:6379/1
      QA_CELERY_TASK_ALWAYS_EAGER: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

volumes:
  qa_postgres_data:
