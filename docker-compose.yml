version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: qa_postgres
    environment:
      POSTGRES_DB: qa_review
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - qa_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: qa_redis
    ports:
      - "6379:6379"

  api:
    image: python:3.10
    container_name: qa_api
    working_dir: /workspace
    command: >
      bash -lc "pip install -r requirements.txt &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      QA_DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/qa_review
      QA_CELERY_BROKER_URL: redis://redis:6379/0
      QA_CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "8000:8000"
    volumes:
      - ./:/workspace
    depends_on:
      - postgres
      - redis

  worker:
    image: python:3.10
    container_name: qa_worker
    working_dir: /workspace
    command: >
      bash -lc "pip install -r requirements.txt &&
      celery -A app.core.celery_app.celery_app worker --loglevel=info"
    environment:
      QA_DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/qa_review
      QA_CELERY_BROKER_URL: redis://redis:6379/0
      QA_CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./:/workspace
    depends_on:
      - postgres
      - redis

volumes:
  qa_postgres_data:
